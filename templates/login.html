<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card">

<div class="card-header">

<h3>Login</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<input type="text"
       name="username"
       class="form-control mb-3"
       placeholder="Username">

<input type="password"
       name="password"
       class="form-control mb-3"
       placeholder="Password">

<button class="btn btn-primary w-100">
Login
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
