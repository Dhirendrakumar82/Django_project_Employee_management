{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">
        <h3>Attendance Form</h3>
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success">
                Save
            </button>

            <a href="{% url 'attendance_list' %}"
               class="btn btn-secondary">
               Back
            </a>

        </form>

    </div>

</div>

{% endblock %}
