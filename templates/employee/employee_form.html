
{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h4>Add Employee</h4>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success">

                    Save Employee

                </button>

                <a href="{% url 'employee_list' %}"
                   class="btn btn-secondary">

                   Back

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
